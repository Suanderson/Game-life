<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rotina</title>
</head>

<body>

<h2>Login</h2>
<input id="email">
<input id="senha" type="password">
<button onclick="logar()">Entrar</button>

<div id="app" style="display:none">

<h3 id="pontos"></h3>
<h3 id="km"></h3>

<button onclick="t('cafe','alimentacao')">Café</button>
<button onclick="t('almoco','alimentacao')">Almoço</button>
<button onclick="t('jantar','alimentacao')">Jantar</button>
<button onclick="t('sem_besteira','alimentacao')">Sem besteira</button>

<button onclick="t('calistenia','treino')">Calistenia</button>
<button onclick="t('estudo','estudo')">Estudo</button>

<button onclick="t('quarto','casa')">Quarto</button>
<button onclick="t('casa','casa')">Casa</button>

<button onclick="t('trabalho','trabalho')">Trabalho</button>
<button onclick="t('curso','curso')">Curso</button>

<br><br>

<input id="kmInput" placeholder="KM">
<button onclick="corrida()">Corrida</button>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbytly4uf2iEFEVYU-Nar8mzerHf9RT73kuuHwmM_ssESTy0TuJOevEus9W1cvoeaCBw7w/exec";
let user = "";

// LOGIN
function logar() {
  fetch(API + "?action=login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      senha: senha.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status=="ok"){
      user = d.user;
      app.style.display="block";
      atualizar();
    } else alert("erro login");
  });
}

// TAREFA
function t(nome, cat){
  fetch(API+"?action=salvarTarefa",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({usuario:user,tarefa:nome,categoria:cat})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status=="bloqueado") alert("já fez hoje");
    atualizar();
  });
}

// CORRIDA
function corrida(){
  fetch(API+"?action=registrarCorrida",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({usuario:user,km:kmInput.value})
  }).then(()=>atualizar());
}

// DASHBOARD
function atualizar(){
  fetch(API+"?action=dashboard",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({usuario:user})
  })
  .then(r=>r.json())
  .then(d=>{
    pontos.innerText="Pontos: "+d.pontos;
    km.innerText="KM Semana: "+d.km.semana;
  });
}
</script>

</body>
</html>
