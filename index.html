<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Rotina</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
}

button {
  padding: 10px;
  margin: 5px;
  width: 100%;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

input {
  padding: 10px;
  width: 100%;
  margin: 5px;
}
</style>

</head>
<body>

<div class="container" id="login">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="senha" placeholder="Senha" type="password">
  <button onclick="logar()">Entrar</button>
</div>

<div class="container" id="app" style="display:none">
  <h2>Dashboard</h2>
  <p id="pontos"></p>
  <p id="km"></p>

  <h3>Checklist</h3>

  <button onclick="tarefa('cafe','alimentacao')">Café</button>
  <button onclick="tarefa('almoco','alimentacao')">Almoço</button>
  <button onclick="tarefa('jantar','alimentacao')">Jantar</button>
  <button onclick="tarefa('sem_besteira','alimentacao')">Sem besteira</button>

  <button onclick="tarefa('calistenia','treino')">Calistenia</button>

  <button onclick="tarefa('estudo','estudo')">Estudo</button>

  <button onclick="tarefa('quarto','casa')">Arrumar quarto</button>
  <button onclick="tarefa('casa','casa')">Ajudar em casa</button>

  <button onclick="tarefa('trabalho','trabalho')">Trabalho</button>
  <button onclick="tarefa('curso','curso')">Curso</button>

  <h3>Corrida</h3>
  <input id="kmInput" placeholder="KM">
  <button onclick="corrida()">Registrar Corrida</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyHIrcvZREtqYrgvPTS99ia0lPKWGRPyXfEVNswd2lXsW35g4ozp7UNjsEP48zKPp8/exec";
let usuario = "";

// LOGIN
function logar() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ func: "login", email, senha })
  })
  .then(r => r.json())
  .then(d => {
    if (d.status == "ok") {
      usuario = d.user;
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      atualizar();
    } else {
      alert("Erro no login");
    }
  });
}

// TAREFA
function tarefa(nome, categoria) {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      func: "salvarTarefa",
      usuario,
      tarefa: nome,
      categoria
    })
  })
  .then(() => atualizar());
}

// CORRIDA
function corrida() {
  let km = document.getElementById("kmInput").value;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      func: "registrarCorrida",
      usuario,
      km
    })
  })
  .then(() => atualizar());
}

// ATUALIZAR DASHBOARD
function atualizar() {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      func: "getDashboard",
      usuario
    })
  })
  .then(r => r.json())
  .then(d => {
    document.getElementById("pontos").innerText = "Pontos: " + d.pontos;
    document.getElementById("km").innerText = "KM Semana: " + d.km.semana;
  });
}
</script>

</body>
</html>
